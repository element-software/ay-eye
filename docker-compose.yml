services:
  ai-usage-meter:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE_URL: file:/data/usage.db
      PORT: 8787
      HOST: 0.0.0.0
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-15}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
    restart: unless-stopped
